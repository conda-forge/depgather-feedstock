context:
  version: "0.5.0"
  python_min: "3.12"

package:
  name: depgather
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/d/depgather/depgather-${{ version }}.tar.gz
    sha256: 0a9dd0980c9c8ae01c5acfbe76c97d2b5209a299defa520331a61a0846816f65

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - loguru >=0.7.3
    - requirements-parser >=0.13.0
    - tomli >=2.2.1

tests:
  - python:
      imports:
        - depgather
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Get a list of deps given a pyproject.toml, uv.lock, requirements.txt etc
  homepage: https://github.com/FHPythonUtils/DepGather
  license: MIT
  license_file:
    - LICENSE.md
  documentation: https://github.com/FHPythonUtils/DepGather/blob/master/README.md

extra:
  recipe-maintainers:
    - carlodri
